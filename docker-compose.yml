services:
  planning-api:
    build:
      context: ./apps/planning-api
    container_name: planning-api
    environment:
      PORT: 3002
      AUTH_MODE: dev
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "3002:3002"

  planning-web-app:
    build:
      context: ./apps/planning-web-app
      args:
        VITE_PLAN_DATA_MODE: api
        VITE_PLAN_API_BASE_URL: http://localhost:3002
    container_name: planning-web-app
    ports:
      - "8080:80"
    depends_on:
      - planning-api

