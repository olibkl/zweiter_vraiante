name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  planning-web-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/planning-web-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/planning-web-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  planning-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/planning-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/planning-api/package-lock.json
      - run: npm ci
      - run: node --check index.js
      - run: |
          node index.js &
          API_PID=$!
          sleep 2
          npm run test:smoke
          kill $API_PID
